apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: supermarket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supermarket-secrets
                  key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: supermarket
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
