apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: supermarket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: product-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/product_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supermarket-secrets
                  key: postgres-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: supermarket-config
                  key: kafka-servers
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supermarket-secrets
                  key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: supermarket
spec:
  selector:
    app: product-service
  ports:
    - port: 8080
      targetPort: 8080
