apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: supermarket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/order_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supermarket-secrets
                  key: postgres-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: supermarket-config
                  key: kafka-servers
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: supermarket-config
                  key: product-service-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supermarket-secrets
                  key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: supermarket
spec:
  selector:
    app: order-service
  ports:
    - port: 8081
      targetPort: 8081
