spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/products/**, /api/categories/**

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**

        - id: customer-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/customers/**

        - id: search-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/search/**

        - id: image-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/images/**

server:
  port: 8000

jwt:
  secret: supermarket-jwt-secret-key-must-be-at-least-32-characters
